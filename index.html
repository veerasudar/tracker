<!DOCTYPE html>
<html>
<head>

<title>Login</title>
<link rel="icon" href="brandRa.jpg">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:#2c5364;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:90%;
max-width:350px;
}

input{
padding:12px;
margin:10px 0;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px;
width:100%;
margin-top:8px;
background:orange;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>💰 Expense Tracker Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="register()">Register</button>

<p id="msg"></p>

</div>

<script>

function register(){

let u=username.value
let p=password.value

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

msg.innerText="Registered Successfully"

}

function login(){

let u=username.value
let p=password.value

if(u===localStorage.getItem("user") && p===localStorage.getItem("pass")){

localStorage.setItem("loggedIn","true")

window.location.href="login.html"

}else{

msg.innerText="Wrong login"

}

}

</script>

</body>
</html>
